name: Release Build

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64 Binary
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.21' # Using stable or a range as go 1.26.4 is not currently available in setup-go, though the mod specifies it

    - name: Build Windows x64 binary
      env:
        GOOS: windows
        GOARCH: amd64
      run: |
        mkdir -p deploy
        go build -o deploy/m-cpg-go-windows-amd64.exe .

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: deploy/m-cpg-go-windows-amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
